<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle shine -->
  <rect width="512" height="256" rx="96" ry="96" fill="url(#shine)" opacity="0.4"/>
  <!-- Integral symbol (∫) stylized -->
  <text x="140" y="420" font-family="Georgia, serif" font-size="400" font-weight="bold" fill="white" opacity="0.95">∫</text>
  <!-- Small "f" for Formulo -->
  <text x="280" y="340" font-family="Georgia, serif" font-size="200" font-style="italic" font-weight="bold" fill="rgba(255,255,255,0.7)">f</text>
</svg>
