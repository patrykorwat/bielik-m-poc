name: Deploy to Heroku

on:
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: 'heroku'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Docker Buildx for advanced caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Log in to the Heroku Container Registry
      - name: Log in to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: echo "${HEROKU_API_KEY}" | docker login --username=_ --password-stdin registry.heroku.com

      # 3. Build the image using GitHub Actions cache and push to Heroku
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'formulopl' with your exact Heroku app name if different
          tags: registry.heroku.com/formulopl/web
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Tell Heroku to deploy the image we just pushed
      - name: Release to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          # Install the Heroku CLI
          curl https://cli-assets.heroku.com/install.sh | sh
          # Release the web process
          heroku container:release web --app formulopl