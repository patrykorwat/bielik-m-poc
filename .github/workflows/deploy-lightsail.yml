name: Deploy to Lightsail (legacy, build on Lightsail)

# Stary workflow ktory budowal obraz BEZPOSREDNIO na Lightsailu.
# Dzialal ale wolny i ryzykowny (build z Mathlib na 4 GB pudle 30+ min).
# Domyslnie deploy idzie przez build-and-deploy.yml (build w CI, push do GHCR,
# pull na Lightsailu). Ten workflow zostaje jako manual fallback.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          # Build z Mathlibem trwa duzo (download ~5GB pre-built olean + export 8GB image).
          # Default 10min timeout to za malo, podnosimy oba do 60 min.
          command_timeout: 60m
          timeout: 60m
          script: |
            set -e
            cd /opt/formulo/formulopl
            git pull origin main
            docker compose up -d --build
            sleep 5
            docker compose ps
            curl -sf http://localhost:80/health | python3 -m json.tool || echo "Health check pending, app may still be starting..."
