<!doctype html>
<html lang="pl" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(){
        var t = localStorage.getItem('formulo-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="keywords" content="matematyka, matura, asystent matematyczny, rozwiązywanie zadań, kalkulator matematyczny, pochodne, całki, równania, Bielik, formulo" />
    <link rel="canonical" href="https://formulo.pl/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Formulo - Asystent Matematyczny" />
    <meta property="og:description" content="Darmowy asystent matematyczny po polsku. Rozwiązuje zadania krok po kroku i tłumaczy sposób rozwiązywania. Od matury po studia." />

    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://formulo.pl/og-image.png" />

    <!-- Cookie consent + conditional GA/AdSense -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Default: deny analytics and ads until consent is given.
      // When Google Funding Choices (CMP) loads, it manages consent via TCF.
      // When our fallback banner is used, we update consent manually.
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'wait_for_update': 1500
      });

      // If user already gave consent via our fallback banner, apply it immediately
      (function(){
        var consent = localStorage.getItem('formulo-cookie-consent');
        if (consent === 'all') {
          gtag('consent', 'update', {
            'analytics_storage': 'granted',
            'ad_storage': 'granted',
            'ad_user_data': 'granted',
            'ad_personalization': 'granted'
          });
        }
        // If consent === 'necessary', keep denied
        // If no consent stored and Google CMP (FCCDCF cookie) handled it,
        // Google reads TCF signals automatically, no manual update needed
      })();

      // Called by our fallback CookieConsent component
      window.formuloGrantConsent = function(level) {
        localStorage.setItem('formulo-cookie-consent', level);
        if (level === 'all') {
          gtag('consent', 'update', {
            'analytics_storage': 'granted',
            'ad_storage': 'granted',
            'ad_user_data': 'granted',
            'ad_personalization': 'granted'
          });
        }
      };
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3H9NVJWHJQ"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-3H9NVJWHJQ');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
